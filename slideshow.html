<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Slideshow — Basecamp Beats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bb-cyan: #00d2ff;
      --bb-mint: #63e6be;
      --bb-red: #e85d75;
    }
    
    body {
      margin: 0;
      font-family: 'Poppins', 'Inter', -apple-system, sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
      position: relative;
    }
    
    .slideshow-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #05050c 0%, #0a0b1e 35%, #100818 55%);
    }
    
    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    
    .slide.active {
      opacity: 1;
      z-index: 1;
    }
    
    .slide img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 210, 255, 0.3);
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 40px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #00d2ff 0%, var(--bb-red) 48%, #63e6be 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
    
    .counter {
      background: rgba(0, 210, 255, 0.15);
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid rgba(0, 210, 255, 0.4);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--bb-cyan);
    }
    
    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 15px;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px 25px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 210, 255, 0.3);
    }
    
    .control-btn {
      background: rgba(0, 210, 255, 0.2);
      border: 1px solid rgba(0, 210, 255, 0.4);
      color: var(--bb-cyan);
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }
    
    .control-btn:hover {
      background: rgba(0, 210, 255, 0.3);
      border-color: var(--bb-cyan);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4);
    }
    
    .control-btn:active {
      transform: translateY(0);
    }
    
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(160deg, #05050c 0%, #0a0b1e 35%, #100818 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 210, 255, 0.2);
      border-top-color: var(--bb-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .no-photos {
      text-align: center;
      padding: 40px;
    }
    
    .no-photos h2 {
      color: var(--bb-cyan);
      font-size: 2rem;
      margin-bottom: 15px;
    }
    
    .no-photos p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
    }
    
    @media (max-width: 767px) {
      .header {
        padding: 15px 20px;
        flex-direction: column;
        gap: 10px;
      }
      
      .header h1 {
        font-size: 1.2rem;
      }
      
      .controls {
        bottom: 20px;
        padding: 12px 20px;
        gap: 10px;
      }
      
      .control-btn {
        padding: 10px 18px;
        font-size: 0.85rem;
      }
      
      .slide img {
        max-width: 95vw;
        max-height: 80vh;
      }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div class="loading-text">Loading photos...</div>
  </div>
  
  <div class="header">
    <h1>📸 Live Event Photos</h1>
    <div class="counter">
      <span id="currentSlide">0</span> / <span id="totalSlides">0</span>
    </div>
  </div>
  
  <div class="slideshow-container" id="slideshowContainer">
    <div class="no-photos" id="noPhotos" style="display: none;">
      <h2>No photos yet</h2>
      <p>Photos will appear here as people upload them!</p>
    </div>
  </div>
  
  <div class="controls">
    <button class="control-btn" id="prevBtn">← Previous</button>
    <button class="control-btn" id="playPauseBtn">⏸ Pause</button>
    <button class="control-btn" id="nextBtn">Next →</button>
  </div>
  
  <script>
    // Gallery Worker: list endpoint is GET /images (returns { images: [{ url, ... }] })
    const GALLERY_BASE = 'https://bb-photo-gallery.beatsbasecamp.workers.dev';
    const GALLERY_LIST_URL = `${GALLERY_BASE}/images`;

    let photos = [];
    let currentIndex = 0;
    let isPlaying = true;
    let slideInterval;
    const SLIDE_DURATION = 5000;
    const REFRESH_INTERVAL = 30000;
    
    const slideshowContainer = document.getElementById('slideshowContainer');
    const loadingScreen = document.getElementById('loadingScreen');
    const noPhotos = document.getElementById('noPhotos');
    const currentSlideEl = document.getElementById('currentSlide');
    const totalSlidesEl = document.getElementById('totalSlides');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    
    function imageUrlsFromApi(data) {
      const items = data.images || [];
      return items.map((item) => {
        const path = item.url || `/image/${encodeURIComponent(item.key)}`;
        return path.startsWith('http') ? path : new URL(path, GALLERY_BASE).href;
      });
    }

    async function fetchPhotos() {
      try {
        const response = await fetch(GALLERY_LIST_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const nextUrls = imageUrlsFromApi(data);

        if (nextUrls.length === 0) {
          photos = [];
          slideshowContainer.querySelectorAll('.slide').forEach((el) => el.remove());
          showNoPhotos();
          loadingScreen.classList.add('hidden');
          return;
        }

        const slideCount = document.querySelectorAll('.slide').length;
        photos = nextUrls;

        if (slideCount === 0) {
          initSlideshow();
        } else if (nextUrls.length > slideCount) {
          updateSlideshow();
        } else if (nextUrls.length < slideCount) {
          initSlideshow();
        }
      } catch (error) {
        console.error('Error fetching photos:', error);
        if (photos.length === 0) {
          showNoPhotos();
        }
      }
    }
    
    function initSlideshow() {
      slideshowContainer.querySelectorAll('.slide').forEach((el) => el.remove());
      noPhotos.style.display = 'none';

      photos.forEach((url, index) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        if (index === 0) slide.classList.add('active');
        
        const img = document.createElement('img');
        img.src = url;
        img.alt = `Event photo ${index + 1}`;
        
        slide.appendChild(img);
        slideshowContainer.appendChild(slide);
      });
      
      updateCounter();
      loadingScreen.classList.add('hidden');
      
      if (isPlaying && photos.length > 1) {
        startSlideshow();
      }
    }
    
    function updateSlideshow() {
      const existingSlides = slideshowContainer.querySelectorAll('.slide').length;
      
      for (let i = existingSlides; i < photos.length; i++) {
        const slide = document.createElement('div');
        slide.className = 'slide';
        
        const img = document.createElement('img');
        img.src = photos[i];
        img.alt = `Event photo ${i + 1}`;
        
        slide.appendChild(img);
        slideshowContainer.appendChild(slide);
      }
      
      updateCounter();
    }
    
    function showNoPhotos() {
      loadingScreen.classList.add('hidden');
      noPhotos.style.display = 'block';
    }
    
    function showSlide(index) {
      const slides = document.querySelectorAll('.slide');
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });
      currentIndex = index;
      updateCounter();
    }
    
    function nextSlide() {
      const nextIndex = (currentIndex + 1) % photos.length;
      showSlide(nextIndex);
    }
    
    function prevSlide() {
      const prevIndex = (currentIndex - 1 + photos.length) % photos.length;
      showSlide(prevIndex);
    }
    
    function startSlideshow() {
      slideInterval = setInterval(nextSlide, SLIDE_DURATION);
    }
    
    function stopSlideshow() {
      clearInterval(slideInterval);
    }
    
    function togglePlayPause() {
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        playPauseBtn.innerHTML = '⏸ Pause';
        if (photos.length > 1) startSlideshow();
      } else {
        playPauseBtn.innerHTML = '▶ Play';
        stopSlideshow();
      }
    }
    
    function updateCounter() {
      currentSlideEl.textContent = photos.length > 0 ? currentIndex + 1 : 0;
      totalSlidesEl.textContent = photos.length;
    }
    
    prevBtn.addEventListener('click', () => {
      prevSlide();
      if (isPlaying) {
        stopSlideshow();
        startSlideshow();
      }
    });
    
    nextBtn.addEventListener('click', () => {
      nextSlide();
      if (isPlaying) {
        stopSlideshow();
        startSlideshow();
      }
    });
    
    playPauseBtn.addEventListener('click', togglePlayPause);
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === ' ') {
        e.preventDefault();
        togglePlayPause();
      }
    });
    
    fetchPhotos();
    setInterval(fetchPhotos, REFRESH_INTERVAL);
  </script>
</body>
</html>
