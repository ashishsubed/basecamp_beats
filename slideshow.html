<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Slideshow — Basecamp Beats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bb-cyan: #00d2ff;
      --bb-mint: #63e6be;
      --bb-violet: rgba(150, 120, 220, 0.35);
      --glow-cyan: rgba(0, 210, 255, 0.22);
      --glow-mint: rgba(99, 230, 190, 0.14);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', 'Poppins', system-ui, sans-serif;
      background: #05050d;
      color: #fff;
    }

    /* Soft ambient glow — simple, no animation */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient span {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.55;
    }

    .ambient .g1 {
      width: min(85vw, 520px);
      height: min(85vw, 520px);
      top: -12%;
      right: -8%;
      background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 68%);
    }

    .ambient .g2 {
      width: min(70vw, 420px);
      height: min(70vw, 420px);
      bottom: -10%;
      left: -6%;
      background: radial-gradient(circle, var(--bb-violet) 0%, transparent 68%);
    }

    .ambient .g3 {
      width: 45vmin;
      height: 45vmin;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--glow-mint) 0%, transparent 72%);
      opacity: 0.35;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #05050d;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 40%, rgba(0, 210, 255, 0.08), transparent 60%);
      pointer-events: none;
    }

    .loading-screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader {
      position: relative;
      z-index: 1;
      width: 44px;
      height: 44px;
      border: 2px solid rgba(0, 210, 255, 0.12);
      border-top-color: var(--bb-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 28px rgba(0, 210, 255, 0.2);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      position: relative;
      z-index: 1;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.45);
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 14px 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
      background: rgba(5, 6, 15, 0.42);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0, 210, 255, 0.1);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.25);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }

    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    .btn-delete {
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(232, 93, 117, 0.35);
      background: rgba(20, 10, 16, 0.55);
      color: rgba(255, 200, 205, 0.95);
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 20px rgba(232, 93, 117, 0.08);
    }

    .btn-delete:hover:not(:disabled) {
      background: rgba(232, 93, 117, 0.15);
      border-color: rgba(232, 93, 117, 0.55);
      color: #fff;
      box-shadow: 0 0 24px rgba(232, 93, 117, 0.15);
    }

    .btn-delete:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .top-bar h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(0.95rem, 2.2vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 0 32px rgba(0, 210, 255, 0.25);
    }

    .counter {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.55);
      padding: 7px 15px;
      border-radius: 999px;
      border: 1px solid rgba(0, 210, 255, 0.18);
      background: rgba(8, 12, 24, 0.65);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 24px rgba(0, 210, 255, 0.06);
    }

    .stage {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #06060f 0%, #0a0c18 48%, #050508 100%);
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.45);
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 24px 48px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 1.1s step-end;
      z-index: 1;
    }

    .slide.is-on {
      opacity: 1;
      visibility: visible;
      z-index: 2;
      transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0s;
    }

    .slide img {
      max-width: min(92vw, 1600px);
      max-height: min(82vh, 900px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.07),
        0 28px 64px rgba(0, 0, 0, 0.5),
        0 0 48px rgba(0, 210, 255, 0.12),
        0 0 100px rgba(99, 230, 190, 0.06);
    }

    /* Single transform timeline: ease in, then slow drift (Ken Burns–style) */
    .slide.is-on img {
      animation: photoReveal 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes photoReveal {
      0% {
        opacity: 0;
        transform: scale(1.1);
        filter: brightness(0.85);
      }
      14% {
        opacity: 1;
        transform: scale(1);
        filter: brightness(1);
      }
      100% {
        opacity: 1;
        transform: scale(1.045);
        filter: brightness(1);
      }
    }

    .no-photos {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 40px 24px;
      max-width: 400px;
    }

    .no-photos h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: rgba(0, 210, 255, 0.85);
      margin-bottom: 10px;
      text-shadow: 0 0 28px rgba(0, 210, 255, 0.2);
    }

    .no-photos p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.95rem;
      line-height: 1.55;
      font-weight: 500;
    }

    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      z-index: 60;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      pointer-events: none;
      box-shadow: 0 -8px 32px rgba(0, 210, 255, 0.06);
      transition: opacity 0.38s ease, transform 0.38s ease;
    }

    /* Hide top bar + progress until mouse moves (JS adds .chrome-auto-hide on fine pointers only) */
    body.chrome-auto-hide:not(.chrome-visible) header.top-bar,
    body.chrome-auto-hide:not(.chrome-visible) #progressWrap {
      opacity: 0;
      visibility: hidden;
    }

    body.chrome-auto-hide:not(.chrome-visible) header.top-bar {
      transform: translateY(-10px);
    }

    body.chrome-auto-hide:not(.chrome-visible) #progressWrap {
      transform: translateY(8px);
    }

    @media (prefers-reduced-motion: reduce) {
      body.chrome-auto-hide:not(.chrome-visible) header.top-bar,
      body.chrome-auto-hide:not(.chrome-visible) #progressWrap {
        transform: none;
      }
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      transform: scaleX(0);
      background: linear-gradient(90deg, rgba(0, 210, 255, 0.85), rgba(99, 230, 190, 0.75));
      box-shadow: 0 0 16px rgba(0, 210, 255, 0.45);
    }

    .progress-bar.is-running {
      animation-name: progressFill;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes progressFill {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @media (max-width: 767px) {
      .slide {
        padding: 64px 12px 40px;
      }
      .slide img {
        max-height: 78vh;
        border-radius: 12px;
      }
      .top-bar {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <span class="g1"></span>
    <span class="g2"></span>
    <span class="g3"></span>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div class="loading-text">Loading photos…</div>
  </div>

  <header class="top-bar">
    <h1>Live photos</h1>
    <div class="top-bar-actions">
      <button type="button" class="btn-delete" id="deleteBtn" disabled title="Remove the photo currently on screen from the slideshow">
        Remove photo
      </button>
      <div class="counter"><span id="currentSlide">0</span> / <span id="totalSlides">0</span></div>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="no-photos" id="noPhotos" hidden>
      <h2>No photos yet</h2>
      <p>Images will appear here as guests upload them.</p>
    </div>
  </div>

  <div class="progress" id="progressWrap" aria-hidden="true">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    const GALLERY_BASE = 'https://bb-photo-gallery.beatsbasecamp.workers.dev';
    const GALLERY_LIST_URL = `${GALLERY_BASE}/images`;
    const SLIDE_MS = 4000;
    const REFRESH_MS = 30000;

    const stage = document.getElementById('stage');
    const loadingScreen = document.getElementById('loadingScreen');
    const noPhotos = document.getElementById('noPhotos');
    const currentSlideEl = document.getElementById('currentSlide');
    const totalSlidesEl = document.getElementById('totalSlides');
    const progressBar = document.getElementById('progressBar');
    const progressWrap = document.getElementById('progressWrap');
    const deleteBtn = document.getElementById('deleteBtn');

    let photos = [];
    let index = 0;
    let slideTimer = null;
    let progressTimer = null;

    function extractKeyFromUrl(url) {
      if (!url || typeof url !== 'string') return '';
      try {
        const u = url.startsWith('http') ? new URL(url) : new URL(url, GALLERY_BASE);
        const match = u.pathname.match(/\/image\/(.+)$/);
        return match ? decodeURIComponent(match[1]) : '';
      } catch {
        return '';
      }
    }

    function photosFromApi(data) {
      const items = data.images || [];
      return items
        .map((item) => {
          const key = (item.key && String(item.key)) || extractKeyFromUrl(item.url);
          const path = item.url || (key ? `/image/${encodeURIComponent(key)}` : '');
          const url = path.startsWith('http') ? path : new URL(path, GALLERY_BASE).href;
          return { key, url };
        })
        .filter((p) => p.key);
    }

    function updateCounter() {
      currentSlideEl.textContent = photos.length ? index + 1 : 0;
      totalSlidesEl.textContent = photos.length;
      const cur = photos[index];
      deleteBtn.disabled = !photos.length || !cur?.key;
    }

    function clearTimers() {
      clearInterval(slideTimer);
      slideTimer = null;
      clearTimeout(progressTimer);
      progressTimer = null;
      progressBar.classList.remove('is-running');
      progressBar.style.animationDuration = '';
    }

    function startProgress() {
      progressBar.classList.remove('is-running');
      void progressBar.offsetWidth;
      progressBar.style.animationDuration = `${SLIDE_MS}ms`;
      progressBar.classList.add('is-running');
    }

    function showIndex(i) {
      const slides = stage.querySelectorAll('.slide');
      if (!slides.length) return;
      index = ((i % slides.length) + slides.length) % slides.length;
      slides.forEach((el, j) => el.classList.toggle('is-on', j === index));
      updateCounter();
    }

    function advance() {
      if (photos.length <= 1) return;
      showIndex(index + 1);
      startProgress();
    }

    function startAuto() {
      clearTimers();
      progressWrap.style.visibility = photos.length > 1 ? 'visible' : 'hidden';
      if (photos.length <= 1) {
        return;
      }
      startProgress();
      slideTimer = setInterval(advance, SLIDE_MS);
    }

    function buildSlides() {
      stage.querySelectorAll('.slide').forEach((n) => n.remove());
      noPhotos.hidden = true;

      photos.forEach((photo, i) => {
        const div = document.createElement('div');
        div.className = 'slide' + (i === 0 ? ' is-on' : '');
        div.dataset.key = photo.key;
        const img = document.createElement('img');
        img.src = photo.url;
        img.alt = `Photo ${i + 1}`;
        img.loading = i === 0 ? 'eager' : 'lazy';
        div.appendChild(img);
        stage.appendChild(div);
      });

      index = 0;
      updateCounter();
      loadingScreen.classList.add('is-hidden');
      startAuto();
    }

    function showEmpty() {
      clearTimers();
      progressWrap.style.visibility = 'hidden';
      stage.querySelectorAll('.slide').forEach((n) => n.remove());
      noPhotos.hidden = false;
      loadingScreen.classList.add('is-hidden');
      updateCounter();
    }

    async function fetchPhotos() {
      try {
        const res = await fetch(GALLERY_LIST_URL);
        if (!res.ok) throw new Error(String(res.status));
        const data = await res.json();
        const next = photosFromApi(data);

        if (next.length === 0) {
          photos = [];
          showEmpty();
          return;
        }

        const prevSig = photos.map((p) => p.key + '\t' + p.url).join('\0');
        photos = next;
        const changed = prevSig !== photos.map((p) => p.key + '\t' + p.url).join('\0');
        const needsBuild = stage.querySelectorAll('.slide').length === 0 || changed;

        if (needsBuild) {
          buildSlides();
        } else {
          updateCounter();
        }
      } catch (e) {
        console.error(e);
        if (!photos.length && !stage.querySelector('.slide')) showEmpty();
      }
    }

    async function deleteCurrentPhoto() {
      if (!photos.length) return;
      const p = photos[index];
      if (!p?.key) {
        alert('Cannot delete this image (missing key).');
        return;
      }
      if (!confirm('Remove this photo from the slideshow for everyone?')) return;

      let pin = sessionStorage.getItem('bb_slideshow_delete_pin') || '';

      const doDelete = async (headerPin) =>
        fetch(`${GALLERY_BASE}/image/${encodeURIComponent(p.key)}`, {
          method: 'DELETE',
          headers: headerPin ? { 'X-Delete-Key': headerPin } : {},
        });

      let res = await doDelete(pin);
      if (res.status === 401) {
        sessionStorage.removeItem('bb_slideshow_delete_pin');
        pin = prompt('Enter staff PIN to remove photos:') || '';
        if (!pin) return;
        sessionStorage.setItem('bb_slideshow_delete_pin', pin);
        res = await doDelete(pin);
      }

      if (!res.ok) {
        let msg = res.statusText;
        try {
          const j = await res.json();
          if (j.error) msg = j.error;
        } catch (_) {
          try {
            msg = await res.text();
          } catch (_) {}
        }
        alert('Could not delete: ' + msg);
        return;
      }

      await fetchPhotos();
    }

    deleteBtn.addEventListener('click', () => {
      deleteCurrentPhoto();
    });

    (function initRegionChrome() {
      const mq = window.matchMedia('(hover: hover) and (pointer: fine)');
      if (!mq.matches) return;

      document.body.classList.add('chrome-auto-hide');

      const TOP_PX = 100;
      const BOTTOM_PX = 56;
      let lastY = window.innerHeight * 0.5;

      function updateChromeVisibility() {
        if (document.activeElement?.closest('header.top-bar')) {
          document.body.classList.add('chrome-visible');
          return;
        }
        const h = window.innerHeight || 1;
        const inTop = lastY >= 0 && lastY < TOP_PX;
        const inBottom = lastY > h - BOTTOM_PX;
        document.body.classList.toggle('chrome-visible', inTop || inBottom);
      }

      document.addEventListener(
        'mousemove',
        (e) => {
          lastY = e.clientY;
          updateChromeVisibility();
        },
        { passive: true }
      );

      window.addEventListener('resize', () => {
        updateChromeVisibility();
      });

      const topBar = document.querySelector('header.top-bar');
      topBar?.addEventListener('focusin', updateChromeVisibility);
      topBar?.addEventListener('focusout', () => {
        setTimeout(updateChromeVisibility, 0);
      });
    })();

    fetchPhotos();
    setInterval(fetchPhotos, REFRESH_MS);
  </script>
</body>
</html>
