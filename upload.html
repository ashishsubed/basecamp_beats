<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Your Photo — Basecamp Beats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@500;600;700&family=Righteous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bb-cyan: #00d2ff;
      --bb-mint: #63e6be;
      --bb-red: #e85d75;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(0, 210, 255, 0.18);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', 'Inter', system-ui, sans-serif;
      color: #fff;
      background: linear-gradient(165deg, #05050c 0%, #0a0b1e 40%, #0c0818 100%);
      background-attachment: fixed;
      padding: 24px 20px 32px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 80% 0%, rgba(140, 100, 220, 0.08), transparent 55%),
        radial-gradient(ellipse 70% 45% at 15% 90%, rgba(0, 210, 255, 0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .back-link {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 auto 20px;
      max-width: 560px;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--bb-mint);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .title-block {
      text-align: center;
      margin-bottom: 28px;
    }

    .title-block h1 {
      font-family: 'Righteous', 'Poppins', sans-serif;
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 400;
      background: linear-gradient(120deg, var(--bb-cyan) 0%, var(--bb-red) 50%, var(--bb-mint) 100%);
      background-size: 160% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .title-block p {
      color: rgba(255, 255, 255, 0.58);
      font-size: 0.98rem;
      font-weight: 500;
    }

    .dropzone {
      border: 1.5px dashed rgba(0, 210, 255, 0.35);
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s ease, background 0.25s ease;
      background: rgba(0, 210, 255, 0.03);
    }

    .dropzone:hover,
    .dropzone:focus-within {
      border-color: rgba(0, 210, 255, 0.65);
      background: rgba(0, 210, 255, 0.06);
    }

    .dropzone.dragover {
      border-color: var(--bb-mint);
      background: rgba(99, 230, 190, 0.08);
    }

    .dropzone .icon {
      font-size: 2.75rem;
      line-height: 1;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .dropzone h2 {
      color: var(--bb-cyan);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .dropzone .hint {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.88rem;
    }

    input[type="file"] {
      display: none;
    }

    .preview {
      display: none;
      margin-bottom: 4px;
    }

    .preview.is-on {
      display: block;
    }

    .preview img {
      width: 100%;
      border-radius: 12px;
      display: block;
      margin-bottom: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00b8e6 0%, #2a8fd9 100%);
      color: #fff;
      box-shadow: 0 6px 24px rgba(0, 180, 230, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0, 200, 255, 0.4);
    }

    .btn-ghost {
      background: transparent;
      color: rgba(255, 255, 255, 0.85);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      font-weight: 600;
    }

    .btn-ghost:hover:not(:disabled) {
      border-color: rgba(0, 210, 255, 0.5);
      color: #fff;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 600;
      display: none;
    }

    .status.is-on {
      display: block;
    }

    .status.ok {
      background: rgba(99, 230, 190, 0.12);
      border: 1px solid rgba(99, 230, 190, 0.35);
      color: var(--bb-mint);
    }

    .status.err {
      background: rgba(232, 93, 117, 0.1);
      border: 1px solid rgba(232, 93, 117, 0.35);
      color: #f0a0ad;
    }

    .loading-dot {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-left: 8px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-link {
      text-align: center;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-link a {
      color: var(--bb-mint);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .footer-link a:hover {
      color: var(--bb-cyan);
    }

    .success-panel {
      text-align: center;
      padding: 12px 8px 8px;
    }

    .success-panel .success-check {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(99, 230, 190, 0.25), rgba(0, 210, 255, 0.15));
      border: 2px solid rgba(99, 230, 190, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      line-height: 1;
    }

    .success-panel h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--bb-mint);
      margin-bottom: 10px;
    }

    .success-panel .success-lead {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.05rem;
      margin-bottom: 14px;
    }

    .success-panel .success-hint {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.92rem;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto 16px;
    }

    .success-panel .btn-another {
      margin-bottom: 22px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 26px 20px;
      }
      .dropzone {
        padding: 28px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="/">← Back to event</a>

    <div class="card">
      <div id="uploadFlow">
        <div class="title-block">
          <h1>Photo upload</h1>
          <p>Share a moment from the night</p>
        </div>

        <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Choose image">
          <div class="icon" aria-hidden="true">📷</div>
          <h2>Tap or drop your photo</h2>
          <p class="hint">JPG, PNG, or HEIC · max 10 MB</p>
          <input type="file" id="fileInput" accept="image/*" />
        </div>

        <div class="preview" id="preview">
          <img id="previewImg" alt="Preview" />
          <div class="actions">
            <button type="button" class="btn btn-primary" id="uploadBtn">
              <span id="btnLabel">Upload</span>
            </button>
            <button type="button" class="btn btn-ghost" id="clearBtn">Clear</button>
          </div>
        </div>

        <div class="status" id="status" role="alert"></div>

        <div class="footer-link">
          <a href="/slideshow.html">View live slideshow →</a>
        </div>
      </div>

      <div class="success-panel" id="successPanel" hidden role="status" aria-live="polite">
        <div class="success-check" aria-hidden="true">✓</div>
        <h2>Thank you!</h2>
        <p class="success-lead">Your photo is uploaded :)</p>
        <p class="success-hint">Use the button below or refresh the page to share another photo.</p>
        <button type="button" class="btn btn-ghost btn-another" id="uploadAnotherBtn">Upload another photo</button>
        <div class="footer-link">
          <a href="/slideshow.html">View live slideshow →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /** Rate limits: Worker only (429 + Retry-After). */
    const UPLOAD_URL = 'https://bb-photo-upload.beatsbasecamp.workers.dev/upload';

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const uploadBtn = document.getElementById('uploadBtn');
    const btnLabel = document.getElementById('btnLabel');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const uploadFlow = document.getElementById('uploadFlow');
    const successPanel = document.getElementById('successPanel');

    let file = null;

    /** After upload success or bfcache restore — show form again and clear state */
    function showUploadUI() {
      uploadFlow.hidden = false;
      successPanel.hidden = true;
      file = null;
      previewImg.removeAttribute('src');
      preview.classList.remove('is-on');
      dropzone.style.display = 'block';
      fileInput.value = '';
      uploadBtn.disabled = false;
      btnLabel.textContent = 'Upload';
      hideStatus();
    }

    // Back/forward cache: page can restore with success panel visible but broken handlers
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        showUploadUI();
      }
    });

    document.getElementById('uploadAnotherBtn').addEventListener('click', showUploadUI);

    dropzone.addEventListener('click', () => {
      // Lets user pick the same file again (change event often skips if path unchanged)
      fileInput.value = '';
      fileInput.click();
    });
    dropzone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    ['dragover', 'dragenter'].forEach((ev) => {
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });
    ['dragleave', 'drop'].forEach((ev) => {
      dropzone.addEventListener(ev, () => dropzone.classList.remove('dragover'));
    });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      const f = e.dataTransfer.files?.[0];
      if (f) pickFile(f);
    });

    fileInput.addEventListener('change', () => {
      const f = fileInput.files?.[0];
      if (f) pickFile(f);
    });

    clearBtn.addEventListener('click', reset);

    function pickFile(f) {
      if (uploadFlow.hidden) {
        showUploadUI();
      }
      if (!f.type.startsWith('image/')) {
        toast('Please choose an image file.', 'err');
        return;
      }
      if (f.size > 10 * 1024 * 1024) {
        toast('File must be under 10 MB.', 'err');
        return;
      }
      file = f;
      const r = new FileReader();
      r.onload = () => {
        previewImg.src = r.result;
        preview.classList.add('is-on');
        dropzone.style.display = 'none';
        hideStatus();
      };
      r.readAsDataURL(f);
    }

    uploadBtn.addEventListener('click', async () => {
      if (!file) return;
      uploadBtn.disabled = true;
      btnLabel.innerHTML = 'Uploading <span class="loading-dot" aria-hidden="true"></span>';

      try {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch(UPLOAD_URL, { method: 'POST', body: fd });

        let data = {};
        try {
          data = await res.json();
        } catch (_) {}

        if (res.status === 429) {
          const ra = res.headers.get('Retry-After');
          const sec = Math.max(
            1,
            parseInt(String(data.retryAfterSeconds ?? ra ?? '60'), 10) || 60
          );
          const prefix = data.error?.trim() ? `${data.error.trim()} ` : '';
          toast(`${prefix}Try again in ${sec}s.`, 'err');
          return;
        }

        if (res.ok) {
          hideStatus();
          uploadFlow.hidden = true;
          successPanel.hidden = false;
          return;
        } else {
          toast(data.error || 'Upload failed.', 'err');
        }
      } catch (e) {
        console.error(e);
        toast('Network error. Try again.', 'err');
      } finally {
        uploadBtn.disabled = false;
        btnLabel.textContent = 'Upload';
      }
    });

    function toast(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status is-on ' + (kind === 'ok' ? 'ok' : 'err');
    }

    function hideStatus() {
      statusEl.classList.remove('is-on', 'ok', 'err');
      statusEl.textContent = '';
    }

    function reset() {
      file = null;
      previewImg.removeAttribute('src');
      preview.classList.remove('is-on');
      dropzone.style.display = 'block';
      fileInput.value = '';
      uploadBtn.disabled = false;
      btnLabel.textContent = 'Upload';
      hideStatus();
    }
  </script>
</body>
</html>
